name: CI

# Controla quando o workflow será executado
on:
  push:
    branches: [ "main", "dev" ] 
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  testes: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configuração do Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.13' 

      - name: Instalação das dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execução dos Testes e Verificação da Cobertura (>60%)
        run: |
          # Roda os testes com o coverage
          coverage run -m unittest discover -s testes
          # Exibe o relatório no terminal do GitHub e reprova se for menor que 60%
          coverage report -m --fail-under=60
